---
name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/**"
      - "docs/**"
      - "mkdocs.yaml"
      - "requirements.txt"
      - ".pre-commit-config.yaml"
      - ".yamllint.yaml"
      - ".hadolint.yaml"
      - "renovate.json"
      - "mise.toml"

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  commit-msg:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            perf
            build
            revert

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pre-commit hooks
        run: pre-commit run --all-files -v

  docker-preview:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push preview image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ttl.sh/vikas027/k8s-flagger-tester:6h-${{ github.event.pull_request.number }}-${{ steps.sha.outputs.short }}

      - name: Write image summary
        run: |
          {
            echo "## Docker Preview Image"
            echo ""
            echo "| Setting | Value |"
            echo "|---------|-------|"
            echo "| **Image** | \`ttl.sh/vikas027/k8s-flagger-tester:6h-${{ github.event.pull_request.number }}-${{ steps.sha.outputs.short }}\` |"
            echo "| **PR** | #${{ github.event.pull_request.number }} |"
            echo "| **SHA** | \`${{ steps.sha.outputs.short }}\` |"
            echo ""
            echo "> Image expires after 6 hours (ttl.sh)"
          } >> "$GITHUB_STEP_SUMMARY"

  trivy-scan:
    runs-on: ubuntu-latest
    needs: [docker-preview]
    steps:
      - name: Set image reference
        id: meta
        run: echo "image=ttl.sh/vikas027/k8s-flagger-tester:6h-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          format: "table"
          output: "trivy-results.txt"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"
          ignore-unfixed: true

      - name: Generate scan summary
        if: always()
        run: |
          {
            echo "## 🔍 Security Scan Results"
            echo ""
            echo "| Setting | Value |"
            echo "|---------|-------|"
            echo "| **Image** | \`${{ steps.meta.outputs.image }}\` |"
            echo "| **Severity** | CRITICAL, HIGH, MEDIUM |"
            echo "| **Ignore Unfixed** | Yes |"
            echo ""
            if [ -s trivy-results.txt ]; then
              echo "### 📋 Vulnerabilities Found"
              echo ""
              echo '```'
              cat trivy-results.txt
              echo '```'
            else
              echo "✅ **No vulnerabilities found**"
            fi
            echo ""
            echo "---"
            echo "[Trivy Documentation](https://aquasecurity.github.io/trivy/)"
          } >> "$GITHUB_STEP_SUMMARY"
