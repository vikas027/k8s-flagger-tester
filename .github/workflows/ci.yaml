---
name: CI

# ============================================================================
# GitHub Actions Registry
# ============================================================================
#
# | Action                                      | Version | SHA (Short) | Repository                                              |
# |---------------------------------------------|---------|-------------|---------------------------------------------------------|
# | amannn/action-semantic-pull-request          | v6.1.1  | 48f2562     | https://github.com/amannn/action-semantic-pull-request  |
# | actions/checkout                             | v6.0.3  | df4cb1c     | https://github.com/actions/checkout                     |
# | actions/setup-python                         | v6.2.0  | a309ff8     | https://github.com/actions/setup-python                 |
# | dorny/paths-filter                           | v4.0.1  | fbd0ab8     | https://github.com/dorny/paths-filter                   |
# | docker/setup-buildx-action                   | v4.1.0  | d7f5e7f     | https://github.com/docker/setup-buildx-action           |
# | docker/build-push-action                     | v7.2.0  | f9f3042     | https://github.com/docker/build-push-action             |
# | aquasecurity/trivy-action                    | v0.36.0 | ed142fd     | https://github.com/aquasecurity/trivy-action            |
# | github/codeql-action/upload-sarif           | v4.36.2 | 8aad20d     | https://github.com/github/codeql-action                 |
# ============================================================================

on:
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/**"
      - "docs/**"
      - "mkdocs.yaml"
      - "requirements.txt"
      - ".pre-commit-config.yaml"
      - ".yamllint.yaml"
      - ".hadolint.yaml"
      - "renovate.json"
      - "mise.toml"

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  commit-msg:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            perf
            build
            revert

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pre-commit hooks
        run: pre-commit run --all-files -v

  changes:
    runs-on: ubuntu-latest
    outputs:
      dockerfile: ${{ steps.filter.outputs.dockerfile }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            dockerfile:
              - 'Dockerfile'

  docker-preview:
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.dockerfile == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push preview image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ttl.sh/vikas027/k8s-flagger-tester:6h-${{ github.event.pull_request.number }}-${{ steps.sha.outputs.short }}

      - name: Write image summary
        run: |
          {
            echo "## Docker Preview Image"
            echo ""
            echo "| Setting | Value |"
            echo "|---------|-------|"
            echo "| **Image** | \`ttl.sh/vikas027/k8s-flagger-tester:6h-${{ github.event.pull_request.number }}-${{ steps.sha.outputs.short }}\` |"
            echo "| **PR** | #${{ github.event.pull_request.number }} |"
            echo "| **SHA** | \`${{ steps.sha.outputs.short }}\` |"
            echo ""
            echo "> Image expires after 6 hours (ttl.sh)"
          } >> "$GITHUB_STEP_SUMMARY"

  trivy-scan:
    runs-on: ubuntu-latest
    needs: [docker-preview, changes]
    if: needs.changes.outputs.dockerfile == 'true'
    steps:
      - name: Set image reference
        id: meta
        run: echo "image=ttl.sh/vikas027/k8s-flagger-tester:6h-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Scan image with Trivy (table)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          format: "table"
          output: "trivy-results.txt"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"
          ignore-unfixed: true

      - name: Scan image with Trivy (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif

      - name: Generate scan summary
        if: always()
        run: |
          {
            echo "## 🔍 Security Scan Results"
            echo ""
            echo "| Setting | Value |"
            echo "|---------|-------|"
            echo "| **Image** | \`${{ steps.meta.outputs.image }}\` |"
            echo "| **Severity** | CRITICAL, HIGH, MEDIUM |"
            echo "| **Ignore Unfixed** | Yes |"
            echo ""
            if [ -s trivy-results.txt ]; then
              echo "### 📋 Vulnerabilities Found"
              echo ""
              echo '```'
              cat trivy-results.txt
              echo '```'
            else
              echo "✅ **No vulnerabilities found**"
            fi
            echo ""
            echo "---"
            echo "[Trivy Documentation](https://aquasecurity.github.io/trivy/)"
          } >> "$GITHUB_STEP_SUMMARY"
