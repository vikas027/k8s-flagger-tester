---
name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yaml"
      - "requirements.txt"
      - "CHANGELOG.md"
      - "SECURITY.md"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "docs/**"
      - "mkdocs.yaml"
      - "requirements.txt"

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force

  preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: github.event.action != 'closed'
        with:
          python-version: "3.14"

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: pip install -r requirements.txt

      - name: Build docs
        if: github.event.action != 'closed'
        run: mkdocs build --site-dir /tmp/docs-preview

      - uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          source-dir: /tmp/docs-preview
          comment: false

      - name: Post preview comment
        if: github.event.action != 'closed'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIEW_URL="https://vikas027.github.io/k8s-flagger-tester/pr-preview/pr-${{ github.event.number }}/"
          gh pr comment ${{ github.event.number }} --repo ${{ github.repository }} --body "$(cat <<EOF
          ## 📖 Docs Preview

          > **Note:** This preview is for **documentation only** and is not related to the Docker image.

          | | |
          |---|---|
          | **URL** | ${PREVIEW_URL} |
          | **SHA** | \`${GITHUB_SHA::7}\` |

          _Preview will be removed when this PR is closed._
          EOF
          )"

      - name: Write preview summary
        if: github.event.action != 'closed'
        run: |
          {
            echo "## 📖 Docs Preview"
            echo ""
            echo "> This preview is for **documentation only** and is not related to the Docker image."
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **URL** | https://vikas027.github.io/k8s-flagger-tester/pr-preview/pr-${{ github.event.number }}/ |"
            echo "| **PR** | #${{ github.event.number }} |"
            echo "| **SHA** | \`${GITHUB_SHA::7}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
