---
name: Release

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/**"
      - "docs/**"
      - "mkdocs.yaml"
      - "requirements.txt"
      - "renovate.json"
      - ".release-please-manifest.json"

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release-pr:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.versions.outputs.changed }}
      version: ${{ steps.versions.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release-please
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge release PR
        if: steps.release-please.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRS_JSON: ${{ steps.release-please.outputs.prs }}
        run: |
          PR_NUMBER=$(echo "$PRS_JSON" | jq -r '.[0].number')
          gh pr merge "$PR_NUMBER" --squash

      - name: Determine which components need publishing
        id: versions
        run: |
          git fetch origin main --tags --force
          git checkout origin/main -- .release-please-manifest.json
          VERSION=$(jq -r '."."' .release-please-manifest.json)
          if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
            CHANGED=false
          else
            CHANGED=true
          fi
          {
            echo "version=${VERSION}"
            echo "changed=${CHANGED}"
          } >> "$GITHUB_OUTPUT"

  docker-build:
    needs: release-pr
    if: needs.release-pr.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      IMAGE_NAME: vikas027/k8s-flagger-tester
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Set platform pair
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Check secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "Error: DOCKERHUB_USERNAME secret is not set." >&2
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Error: DOCKERHUB_TOKEN secret is not set." >&2
            exit 1
          fi

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest='${{ steps.build.outputs.digest }}'
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    needs: [release-pr, docker-build]
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: vikas027/k8s-flagger-tester
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.release-pr.outputs.version }}
            type=raw,value=v${{ needs.release-pr.outputs.version }}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Verify manifest
        run: docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ needs.release-pr.outputs.version }}

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign (keyless)
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            ${{ env.IMAGE_NAME }}:${{ needs.release-pr.outputs.version }} \
            --format '{{.Manifest.Digest}}')
          cosign sign --yes "${{ env.IMAGE_NAME }}@${DIGEST}"

      - name: Write image summary
        run: |
          {
            echo "## Docker Image Published"
            echo ""
            echo "| Setting | Value |"
            echo "|---------|-------|"
            echo "| **Image** | \`${{ env.IMAGE_NAME }}\` |"
            echo "| **Tags** | \`${{ needs.release-pr.outputs.version }}\`, \`v${{ needs.release-pr.outputs.version }}\`, \`latest\` |"
            echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  release-publish:
    needs: [release-pr, docker-merge]
    if: |
      always() &&
      needs.release-pr.result == 'success' &&
      (needs.release-pr.outputs.should_publish != 'true' || needs.docker-merge.result == 'success') &&
      needs.release-pr.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
