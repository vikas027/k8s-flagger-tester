---
site_name: k8s-flagger-tester
site_description: Flagger load-tester extended with hurl and k6 for canary gate testing
site_url: https://vikas027.github.io/k8s-flagger-tester/
repo_url: https://github.com/vikas027/k8s-flagger-tester
repo_name: vikas027/k8s-flagger-tester
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: false
  - tables
  - attr_list

nav:
  - Home: index.md
  - Usage: usage.md
  - Configuration: configuration.md
  - Dependency Updates: dependency-updates.md
  - Contributing: contributing.md
  - Changelog: changelog.md
